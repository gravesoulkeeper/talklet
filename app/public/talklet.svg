<svg width="240" height="170" viewBox="0 0 240 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Chat Bubble -->
  <rect 
    x="20" 
    y="20" 
    width="200" 
    height="95" 
    rx="18"
    fill="#FFFFFF"
    stroke="#E8E8E8"
    stroke-width="1"
    filter="url(#softShadow)"
  />

  <!-- Tail -->
  <path 
    d="M70 115 L60 145 L100 115"
    fill="#FFFFFF"
    stroke="#E8E8E8"
    stroke-width="1"
  />

  <!-- Message Lines (Moved Up) -->
  <rect x="60" y="45" width="120" height="8" rx="4" fill="#212121" opacity="0.9"/>
  <rect x="60" y="65" width="90" height="8" rx="4" fill="#212121" opacity="0.8"/>
  <rect x="60" y="85" width="60" height="8" rx="4" fill="#212121" opacity="0.7"/>

</svg>
